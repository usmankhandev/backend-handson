services:
  db:
    image: postgres:15
    container_name: social_ai_db
    restart: always
    environment: 
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_ai
    ports:
      - "55432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d social_ai"]
        interval: 5s
        retries: 5  
volumes:
  postgres_data:
